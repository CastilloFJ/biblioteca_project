<!doctype html>
<html lang="es">
    <head>
        <meta charset="utf-8">
        <title>Libros</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
    <body class="container py-4">
    <h1 class="mb-4">Listado de libros</h1>

    <div class="row g-3">
        {% for libro in libros %}
            <div class="col-12 col-md-6 col-lg-4">
                <div class="card h-100">
                    <div class="card-body">
                        <h5 class="card-title">{{ libro.titulo }}</h5>
                        <p class="card-text mb-1"><strong>ISBN:</strong> {{ libro.isbn }}</p>
                        <p class="card-text mb-1"><strong>Editorial:</strong> {{ libro.editorial.nombre }}</p>
                        <p class="card-text">
                            <strong>Categorías:</strong>
                            {% for c in libro.categorias.all %}
                                <span class="badge text-bg-secondary">{{ c.nombre }}</span>
                            {% empty %}
                                <span class="text-muted">Sin categorías</span>
                            {% endfor %}
                        </p>
                        <a class="btn btn-primary" href="{% url 'biblioteca:detalle_libro' libro.id %}">Ver detalle</a>
                    </div>
                </div>
            </div>
        {% endfor %}
    </div>

    <hr class="my-4">
    <a href="/admin/" class="btn btn-outline-dark">Ir al Admin</a>
</body>
</html>
